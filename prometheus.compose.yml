services:
  prometheus:
    image: 'prom/prometheus:latest'
    container_name: prometheus
    restart: unless-stopped
    command: --config.file /etc/prometheus/prometheus.yml --web.config.file /etc/prometheus/prometheus-web.yml
    extra_hosts:       
      - "host.docker.internal:host-gateway"
    ports:
      - '9090:9090'
    expose:
      - 9090
    networks:
      - monitoring
    volumes:
      - ./config/prometheus:/etc/prometheus
